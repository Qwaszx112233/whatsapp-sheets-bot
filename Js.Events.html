<script>
// Js.Events — active Stage 7 runtime event registration fragment.

  function reportBootstrapError_(error, source) {
    const msg = `[bootstrap:${source}] ${normalizeError(error)}`;
    try { console.error(msg, error); } catch (_) {}
    try { if (STATE.consoleInitialized) logToConsole(`✘ ${msg}`, 'error'); } catch (_) {}
  }

  function registerGlobalRuntimeEvents_() {
    window.WAPB_CLIENT_RUNTIME_POLICY = CLIENT_RUNTIME_POLICY;

    window.addEventListener('error', function(event) {
      reportBootstrapError_(event && event.error ? event.error : (event && event.message) || 'window.error', 'window.error');
    });

    window.addEventListener('unhandledrejection', function(event) {
      reportBootstrapError_(event && event.reason ? event.reason : 'unhandled rejection', 'promise');
    });
  }
</script>
