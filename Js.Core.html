<script>
  // Js.Core — active Stage 7.1 runtime fragment.

  // =========================
  // CONSTANTS
  // =========================
  const SEND_INTERVAL_MS = 8000;
  const CLIENT_RUNTIME_POLICY = Object.freeze({
    runtimeFile: 'JavaScript.html',
    bootstrapTemplate: 'Sidebar.html',
    bootstrapMode: 'sidebar-includeTemplate',
    policyMarker: 'stage7-sidebar-runtime',
    modular: true
  });
  const PANEL_READY_STATUS = '✅ Готово';
  const PANEL_PENDING_STATUS = '🟡 Очікує підтвердження';
  const PANEL_UNSENT_STATUS = '↩️ Не відправлено';
  const PANEL_SENT_STATUS = '📤 Відправлено';
  const PANEL_ERROR_PREFIX = '❌';
  const WA_SENDER_TARGET = 'WAPB_WHATSAPP_SENDER_TAB';

  const PERSONNEL_CALLSIGNS = Object.freeze([
    'ШАХТАР', 'ГРАФ', 'СОВА', 'ДОК', 'ГУГЛ', 'СОНЕЧКО', 'ТУРИСТ', 'МАЛОЙ',
    'КАМАЗ', 'МОНЯ', 'ВАМПИР', 'МАЙОР', 'СТУДЕНТ', 'КОВАЛЬ', 'АСТРОНАВТ', 'ЦАР', 'МАЙСТЕР'
  ]);

  // =========================
  // STATE
  // =========================
  const STATE = {
    currentPanelData: null,
    currentMonth: '',
    monthsList: [],
    currentCalendarDate: new Date(),
    selectedDate: null,

    lastSummaryText: '',
    lastSummaryDate: null,
    lastDetailedText: '',
    lastDetailedDate: null,

    lastHealthReport: null,
    healthCheckMode: 'quick',

    sendingInterval: null,
    _sendingCancelled: false,
    waSenderWindow: null,

    consoleInitialized: false,
    DIAG_TEST_MODE: !!window.DIAG_TEST_MODE,

    panelRefreshSeq: 0,
    panelRefreshInProgress: false,
    lastNonEmptyPanelData: [],
    lastPanelDataUpdatedAt: 0
  };

  // =========================
  // DOM HELPERS
  // =========================
  const $id = id => document.getElementById(id);

  function setHtml(id, html) {
    const el = $id(id);
    if (el) el.innerHTML = String(html ?? '');
  }

  function setText(id, text) {
    const el = $id(id);
    if (el) el.textContent = String(text ?? '');
  }

  function show(id, display = 'block') {
    const el = $id(id);
    if (el) el.style.display = display;
  }

  function hide(id) {
    const el = $id(id);
    if (el) el.style.display = 'none';
  }

  // =========================
  // COMMON HELPERS
  // =========================
  function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeJsString(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\r/g, '')
      .replace(/\n/g, '\\n');
  }

  function normalizeError(error) {
    if (!error) return 'Невідома помилка';
    if (typeof error === 'string') return error;
    if (error.message) return String(error.message);
    return String(error);
  }

  function _todayStr_() {
    const now = new Date();
    const dd = String(now.getDate()).padStart(2, '0');
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const yyyy = String(now.getFullYear());
    return `${dd}.${mm}.${yyyy}`;
  }

  function normalizeApiResponse(response, meta = {}) {
    const ctx = {
      method: meta.method || '',
      ...(response && typeof response === 'object' && response.context ? response.context : {})
    };

    if (response && typeof response === 'object' && 'success' in response && 'data' in response && 'context' in response) {
      const normalized = {
        success: !!response.success,
        message: String(response.message || ''),
        error: response.error ? String(response.error) : null,
        data: response.data === undefined ? null : response.data,
        context: response.context || ctx,
        warnings: Array.isArray(response.warnings) ? response.warnings.filter(Boolean).map(String) : []
      };
      normalized.ok = normalized.success;
      if (normalized.data && typeof normalized.data === 'object' && !Array.isArray(normalized.data)) {
        Object.keys(normalized.data).forEach(key => {
          if (!(key in normalized)) normalized[key] = normalized.data[key];
        });
      }
      return normalized;
    }

    if (response && typeof response === 'object' && 'ok' in response && !('success' in response)) {
      const data = { ...response };
      const success = !!data.ok;
      delete data.ok;
      const normalized = {
        success,
        message: success ? '' : '',
        error: success ? null : String(data.error || 'Операція не виконана'),
        data,
        context: ctx,
        warnings: [],
        ok: success
      };
      if (data && typeof data === 'object' && !Array.isArray(data)) {
        Object.keys(data).forEach(key => {
          if (!(key in normalized)) normalized[key] = data[key];
        });
      }
      return normalized;
    }

    if (typeof response === 'boolean') {
      return {
        success: response,
        ok: response,
        message: '',
        error: response ? null : 'Операція повернула false',
        data: { value: response },
        context: ctx,
        warnings: []
      };
    }

    if (response === undefined) {
      return {
        success: true,
        ok: true,
        message: '',
        error: null,
        data: null,
        context: ctx,
        warnings: []
      };
    }

    const normalized = {
      success: true,
      ok: true,
      message: '',
      error: null,
      data: response,
      context: ctx,
      warnings: []
    };
    if (response && typeof response === 'object' && !Array.isArray(response)) {
      Object.keys(response).forEach(key => {
        if (!(key in normalized)) normalized[key] = response[key];
      });
    }
    return normalized;
  }

  const Api = {
    run(method, ...args) {
      return new Promise((resolve, reject) => {
        try {
          let runner = google.script.run
            .withSuccessHandler(result => resolve(normalizeApiResponse(result, { method })))
            .withFailureHandler(err => reject(normalizeError(err)));

          if (typeof runner[method] !== 'function') {
            reject(`Метод "${method}" не знайдено`);
            return;
          }

          runner[method](...args);
        } catch (err) {
          reject(normalizeError(err));
        }
      }).then(result => {
        if (Array.isArray(result?.warnings) && result.warnings.length) {
          console.warn(`[${method}] warnings:`, result.warnings);
        }
        return result;
      });
    }
  };

  function unwrapStage4Result(response) {
    return response?.data?.result || null;
  }

  function unwrapStage4Meta(response) {
    return response?.data?.meta || null;
  }

  function adaptStage4PanelResponse(response) {
    const result = unwrapStage4Result(response) || {};
    const rows = Array.isArray(result.rows) ? result.rows : [];
    const stats = result.stats || {};
    return {
      success: !!response?.success,
      message: response?.message || '',
      error: response?.error || null,
      data: rows,
      rows,
      stats,
      month: result.month || STATE.currentMonth || '',
      date: result.date || '',
      updatedRows: Array.isArray(result.updatedRows) ? result.updatedRows : [],
      totalCount: Number(stats.totalCount || rows.length || 0),
      readyCount: Number(stats.readyCount || 0),
      errorCount: Number(stats.errorCount || 0),
      sentCount: Number(stats.sentCount || 0),
      warnings: Array.isArray(response?.warnings) ? response.warnings : [],
      context: response?.context || null,
      meta: unwrapStage4Meta(response),
      raw: response
    };
  }

  function adaptStage4SummaryResponse(response, detailed = false) {
    const result = unwrapStage4Result(response) || {};
    return {
      success: !!response?.success,
      message: response?.message || '',
      error: response?.error || null,
      summary: result.summary || '',
      date: result.date || '',
      peopleCount: detailed ? Number(result.peopleCount || 0) : 0,
      vacations: result.vacations || {},
      birthdays: result.birthdays || {},
      data: result,
      warnings: Array.isArray(response?.warnings) ? response.warnings : [],
      context: response?.context || null,
      meta: unwrapStage4Meta(response),
      raw: response
    };
  }

  function adaptStage4UtilityResponse(response) {
    const result = unwrapStage4Result(response) || {};
    return Object.assign({
      success: !!response?.success,
      ok: !!response?.success,
      message: response?.message || '',
      error: response?.error || null,
      data: result,
      warnings: Array.isArray(response?.warnings) ? response.warnings : [],
      context: response?.context || null,
      meta: unwrapStage4Meta(response),
      raw: response
    }, result || {});
  }

  function updateMonthBadge(month) {
    const safeMonth = String(month || '').trim();
    if (!safeMonth) return;
    const statusEl = $id('botMonthStatus');
    if (statusEl) {
      statusEl.innerHTML = `
        <span class="status-dot"></span>
        <span class="status-text">Місяць ${escapeHtml(safeMonth)}</span>
      `;
    }
  }
</script>
