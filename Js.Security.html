<script>
// Js.Security — access/ui fragment aligned with server-side key binding by identifier + callsign.
// Regular users do not copy hashes manually: the key stays inside the system,
// and login happens through a server-approved pair: email/phone + callsign.

(function () {
  'use strict';

  if (typeof window.$id !== 'function') {
    window.$id = function (id) { return document.getElementById(id); };
  }

  if (typeof window.escapeHtml !== 'function') {
    window.escapeHtml = function (value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    };
  }

  if (typeof window.escapeJsString !== 'function') {
    window.escapeJsString = function (value) {
      return String(value == null ? '' : value)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\r/g, '\\r')
        .replace(/\n/g, '\\n');
    };
  }

  if (typeof window.getActionName !== 'function') {
    window.getActionName = function (actionName) {
      const map = {
        daySummary: 'Зведення за день',
        detailedDay: 'Детальне зведення',
        generatePanel: 'Згенерувати SEND_PANEL',
        sendUnsent: 'Відправити невідправлені',
        createNextMonth: 'Створити наступний місяць',
        switchMonth: 'Переключити місяць',
        vacationReminder: 'Перевірка відпусток',
        birthdayCheck: 'Перевірка днів народження',
        debugPhones: 'Діагностика телефонів',
        healthCheck: 'Перевірка системи',
        pendingRepairs: 'Список repair-операцій',
        operationDetails: 'Деталі операції',
        runRepair: 'Запустити repair',
        clearLog: 'Очистити LOG',
        clearCache: 'Очистити кеш',
        clearPhoneCache: 'Очистити кеш телефонів',
        restartBot: 'Перезапустити бота',
        applyProtections: 'Застосувати захист',
        setupTrigger: 'Налаштувати тригер',
        cleanupTriggers: 'Прибрати дублікати тригерів'
      };
      return map[String(actionName || '')] || String(actionName || 'Невідома дія');
    };
  }

  if (typeof window.normalizeError !== 'function') {
    window.normalizeError = function (error) {
      if (!error) return 'Невідома помилка';
      if (typeof error === 'string') return error;
      if (error.message) return error.message;
      try { return JSON.stringify(error); } catch (_) { return String(error); }
    };
  }

  if (typeof window.logToConsole !== 'function') {
    window.logToConsole = function (message) { console.log(message); };
  }

  if (typeof window.showToast !== 'function') {
    window.showToast = function (message) { console.log('[TOAST]', message); };
  }

  if (typeof window.STATE !== 'object' || !window.STATE) {
    window.STATE = {};
  }

  function safeString_(value) {
    return String(value == null ? '' : value).trim();
  }

  function safeNumber_(value, fallback) {
    const n = Number(value);
    return Number.isFinite(n) ? n : (fallback || 0);
  }


  function getSupportHelpText_() {
    return 'Зверніться за допомогою до ШАХТАРЯ';
  }

  function maskHash_(value) {
    const hash = safeString_(value);
    if (!hash) return '';
    if (hash.length <= 10) return hash;
    return hash.slice(0, 6) + '…' + hash.slice(-4);
  }

  function fallbackCopyText_(text) {
    const value = safeString_(text);
    if (!value) return false;
    try {
      const ta = document.createElement('textarea');
      ta.value = value;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-99999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return !!ok;
    } catch (_) {
      return false;
    }
  }

  async function copyText_(text) {
    const value = safeString_(text);
    if (!value) return false;
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      try {
        await navigator.clipboard.writeText(value);
        return true;
      } catch (_) {}
    }
    return fallbackCopyText_(value);
  }

  function boolLabel_(value) {
    return value ? 'Так' : 'Ні';
  }

  function permissionLabel_(value) {
    return value ? 'Дозволено' : 'Заблоковано';
  }

  function pad2_(n) {
    return String(n).padStart(2, '0');
  }

  function getUaWeekdayShort_(date) {
    const days = ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    return days[date.getDay()] || '';
  }

  function getUaMonthShort_(date) {
    const months = ['січ.', 'лют.', 'бер.', 'квіт.', 'трав.', 'черв.', 'лип.', 'серп.', 'вер.', 'жовт.', 'лист.', 'груд.'];
    return months[date.getMonth()] || '';
  }

  function getUtcOffsetText_(date) {
    const offsetMin = -date.getTimezoneOffset();
    const sign = offsetMin >= 0 ? '+' : '-';
    const abs = Math.abs(offsetMin);
    const hh = pad2_(Math.floor(abs / 60));
    const mm = pad2_(abs % 60);
    return 'UTC' + sign + hh + ':' + mm;
  }

  function formatLoginDateTime_(date) {
    const d = date instanceof Date ? date : new Date(date);
    return [
      getUaWeekdayShort_(d) + ',',
      pad2_(d.getDate()),
      getUaMonthShort_(d),
      d.getFullYear() + ',',
      pad2_(d.getHours()) + ':' + pad2_(d.getMinutes()) + ':' + pad2_(d.getSeconds()),
      '(' + getUtcOffsetText_(d) + ')'
    ].join(' ');
  }

  function getLoginGeoPoint_() {
    return new Promise(function(resolve) {
      if (!navigator.geolocation) {
        resolve({ ok: false, text: 'GPS недоступна', coords: null, reason: 'geolocation-not-supported' });
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = Number(position.coords.latitude);
          const lng = Number(position.coords.longitude);
          const acc = Number(position.coords.accuracy || 0);
          resolve({
            ok: true,
            text: lat.toFixed(6) + ', ' + lng.toFixed(6),
            coords: { lat: lat, lng: lng, accuracy: acc },
            reason: ''
          });
        },
        function(error) {
          const code = error && typeof error.code === 'number' ? error.code : 0;
          let reason = 'geolocation-error';
          if (code === 1) reason = 'permission-denied';
          else if (code === 2) reason = 'position-unavailable';
          else if (code === 3) reason = 'timeout';

          resolve({ ok: false, text: 'GPS недоступна', coords: null, reason: reason });
        },
        { enableHighAccuracy: true, timeout: 7000, maximumAge: 0 }
      );
    });
  }

  async function buildLoginMeta_() {
    const now = new Date();
    const geo = await getLoginGeoPoint_();
    return {
      enteredAtIso: now.toISOString(),
      enteredAtText: formatLoginDateTime_(now),
      utcOffset: getUtcOffsetText_(now),
      geo: geo,
      loginPointText: geo && geo.ok ? ('Точка входу: ' + geo.text) : 'Точка входу: GPS недоступна'
    };
  }

  function normalizeAccessForUi_(raw) {
    raw = raw || {};

    const identity = raw.identity || {};
    const access = raw.access || {};
    const policy = raw.policy || {};
    const audit = raw.audit || {};
    const lockout = raw.lockout || raw.lockoutState || {};
    const login = raw.login || {};
    const reasonObj = raw.reason && typeof raw.reason === 'object' ? raw.reason : null;

    const reasonMessage = reasonObj
      ? safeString_(reasonObj.message)
      : safeString_(raw.reasonString || raw.reasonLegacy || raw.reason);

    const reasonCode = reasonObj
      ? safeString_(reasonObj.code)
      : '';

    const currentKeyHashFull = safeString_(identity.currentKeyHashFull || raw.currentKeyHashFull || '');
    const currentKeyHashMasked = safeString_(
      identity.currentKeyHashMasked ||
      raw.currentKeyHashMasked ||
      login.currentKeyHashMasked ||
      maskHash_(currentKeyHashFull)
    );

    const registered = raw.registered !== undefined ? !!raw.registered : !!access.registered;
    const keyAvailable = login.keyAvailable !== undefined
      ? !!login.keyAvailable
      : !!(raw.keyAvailable || currentKeyHashFull || currentKeyHashMasked);

    return {
      raw: raw,
      role: safeString_(raw.role || access.role || 'guest').toLowerCase(),
      enabled: raw.enabled !== undefined ? !!raw.enabled : !!access.enabled,
      knownUser: raw.knownUser !== undefined ? !!raw.knownUser : !!access.knownUser,
      registered: registered,
      readOnly: raw.readOnly !== undefined ? !!raw.readOnly : !!access.readOnly,
      isAdmin: raw.isAdmin !== undefined ? !!raw.isAdmin : !!access.isAdmin,
      isOperator: raw.isOperator !== undefined ? !!raw.isOperator : !!access.isOperator,
      isMaintainer: raw.isMaintainer !== undefined ? !!raw.isMaintainer : !!access.isMaintainer,
      email: safeString_(raw.email || identity.email),
      displayName: safeString_(raw.displayName || identity.displayName),
      personCallsign: safeString_(raw.personCallsign || identity.personCallsign),
      note: safeString_(raw.note || identity.note),
      source: safeString_(raw.source || audit.source || raw.matchSource),
      matchedBy: safeString_(raw.matchedBy || audit.matchedBy),
      lastSeenAt: safeString_(raw.lastSeenAt || audit.lastSeenAt),
      lastRotatedAt: safeString_(raw.lastRotatedAt || audit.lastRotatedAt),
      failedAttempts: safeNumber_(raw.failedAttempts != null ? raw.failedAttempts : audit.failedAttempts, 0),
      mode: safeString_(raw.mode || policy.mode),
      strictUserKeyMode: raw.strictUserKeyMode !== undefined ? !!raw.strictUserKeyMode : !!policy.strictUserKeyMode,
      migrationModeEnabled: raw.migrationModeEnabled !== undefined ? !!raw.migrationModeEnabled : !!policy.migrationModeEnabled,
      userKeyModeEnabled: raw.strictUserKeyMode !== undefined ? !!raw.strictUserKeyMode : !!policy.strictUserKeyMode,
      reason: { code: reasonCode, message: reasonMessage },
      reasonString: reasonMessage,
      lockout: {
        locked: !!lockout.locked,
        disabledByAdmin: !!lockout.disabledByAdmin,
        remainingMs: safeNumber_(lockout.remainingMs, 0),
        remainingMinutes: safeNumber_(lockout.remainingMinutes, 0),
        nextEscalationLevel: safeNumber_(lockout.nextEscalationLevel, 0),
        lastAppliedLevel: safeNumber_(lockout.lastAppliedLevel, 0),
        lastReason: safeString_(lockout.lastReason)
      },
      rotationState: safeString_(raw.rotationState) || 'unknown',
      allowedActions: Array.isArray(raw.allowedActions) ? raw.allowedActions.slice() : [],
      currentKey: '',
      keyAvailable: keyAvailable,
      currentKeyHashFull: currentKeyHashFull,
      currentKeyHashMasked: currentKeyHashMasked,
      supportEmail: safeString_(login.supportEmail || raw.supportEmail),
      supportCallsign: safeString_(login.supportCallsign || raw.supportCallsign || 'ШАХТАР'),
      selfBindRequired: login.selfBindRequired !== undefined ? !!login.selfBindRequired : (keyAvailable && !registered),
      canSelfBind: login.canSelfBind !== undefined ? !!login.canSelfBind : (keyAvailable && !registered),
      loginLockout: {
        locked: !!((login.lockout || raw.loginLockout || {}).locked),
        remainingMinutes: safeNumber_((login.lockout || raw.loginLockout || {}).remainingMinutes, 0),
        attempts: safeNumber_((login.lockout || raw.loginLockout || {}).attempts, 0),
        maxAttempts: safeNumber_((login.lockout || raw.loginLockout || {}).maxAttempts, 0)
      }
    };
  }

  function isAdminRole() {
    return !!(STATE.access && STATE.access.isAdmin);
  }

  function getAccessRoleLabel_(role) {
    const map = {
      guest: 'Гість',
      viewer: 'Спостерігач',
      operator: 'Оператор',
      maintainer: 'Редактор',
      admin: 'Адмін',
      sysadmin: 'Сисадмін',
      owner: 'Власник'
    };
    return map[safeString_(role || 'guest').toLowerCase()] || 'Гість';
  }

  function getAccessRoleRank_(role) {
    const order = {
      guest: 0,
      viewer: 1,
      operator: 2,
      maintainer: 3,
      admin: 4,
      sysadmin: 5,
      owner: 6
    };
    return order[safeString_(role || 'guest').toLowerCase()] || 0;
  }

  function hasRoleAtLeast_(roleName) {
    const access = STATE.access || {};
    return getAccessRoleRank_(access.role) >= getAccessRoleRank_(roleName) && access.enabled !== false;
  }

  function hasDaySummaryAccess_() { return hasRoleAtLeast_('operator'); }
  function hasDetailedSummaryAccess_() { return hasRoleAtLeast_('operator'); }
  function hasWorkingAccess_() { return hasRoleAtLeast_('maintainer'); }
  function hasMaintainerAccess_() { return hasRoleAtLeast_('maintainer'); }

  function getViewerOwnCallsign_() {
    const access = STATE.access || {};
    return safeString_(access.personCallsign);
  }

  function canOpenPersonCardClient_(callsign) {
    const access = STATE.access || {};
    const role = safeString_(access.role || 'guest').toLowerCase();
    const target = safeString_(callsign).toUpperCase();
    const own = getViewerOwnCallsign_().toUpperCase();
    if (!target) return false;
    if (access.isOperator || access.isAdmin) return true;
    if (role !== 'viewer') return false;
    return !!own && own === target;
  }

  async function reportAccessViolation_(actionName, details) {
    try {
      if (!window.MaintenanceApi || typeof MaintenanceApi.reportAccessViolation !== 'function') return;
      await MaintenanceApi.reportAccessViolation(actionName || '', details || {});
    } catch (error) {
      logToConsole('✕ Не вдалося зафіксувати порушення доступу: ' + normalizeError(error), 'error');
    }
  }

  function updateRestrictedUi_() {
    const access = STATE.access || {};
    document.querySelectorAll('[data-role-min]').forEach(function (el) {
      const required = el.getAttribute('data-role-min') || 'guest';
      if (el.classList && el.classList.contains('header-tool-btn')) return;
      el.style.display = hasRoleAtLeast_(required) ? '' : 'none';
    });

    const detailedBtn = $id('btnDetailedSummary');
    if (detailedBtn) {
      const allowed = hasDetailedSummaryAccess_();
      detailedBtn.classList.toggle('is-disabled', !allowed);
      detailedBtn.classList.toggle('is-restricted', !allowed);
      detailedBtn.setAttribute('aria-disabled', allowed ? 'false' : 'true');
      detailedBtn.title = allowed
        ? 'Детальне зведення за день'
        : ('Недоступно для ролі ' + getAccessRoleLabel_(access.role));
    }
  }

  function getAccessReasonMessage_(access) {
    return safeString_((access && access.reason && access.reason.message) || (access && access.reasonString) || '');
  }

  function getAccessSourceLabel_(source) {
    const raw = safeString_(source);
    const map = {
      'ACCESS': 'лист ACCESS',
      'ACCESS-user-key-current': 'зареєстрований поточний user key',
      'ACCESS-user-key-prev': 'зареєстрований попередній user key',
      'ACCESS-user-key-rotated': 'user key оновлено автоматично',
      'ACCESS-user-key-unregistered': 'user key не зареєстровано',
      'ACCESS-email-bound-key': 'ключ прив’язано через аварійний email-міст',
      'ACCESS-email-bridge': 'ідентифікацію підтверджено через аварійний email-міст',
      'scriptProperties': 'Script Properties (тільки аварійна міграція)',
      'scriptProperties-email-bridge': 'аварійний email-міст через Script Properties',
      'bootstrap-owner': 'тимчасовий bootstrap-owner',
      'default': 'режим за замовчуванням'
    };
    return map[raw] || (raw || 'невідомо');
  }

  function buildAccessBannerMessage_(descriptor) {
    const access = descriptor || STATE.access || {};
    const reason = getAccessReasonMessage_(access);
    const note = safeString_(access.note);
    const source = safeString_(access.source);
    const parts = [];
    if (reason) parts.push(reason);
    if (note) parts.push('Примітка: ' + note);
    if (source) parts.push('Джерело: ' + getAccessSourceLabel_(source));
    return parts.join(' • ');
  }

  function getAccessReasonDisplay_(access) {
    const reason = access && access.reason ? access.reason : {};
    const code = safeString_(reason.code);
    const message = safeString_(reason.message || access.reasonString);
    if (!message && code === 'access.ok') return 'доступ підтверджено';
    return message || 'немає';
  }

  function buildAccessDebugExplanation_(access) {
    const role = safeString_((access && access.role) || 'guest').toLowerCase();
    const registered = !!(access && access.registered);
    const keyAvailable = !!(access && access.keyAvailable);

    if (keyAvailable && !registered) {
      return 'Система вже визначила поточний ключ користувача, але він ще не прив’язаний до жодного позивного. Далі вхід виконується не через копіювання hash, а через вибір свого позивного зі списку.';
    }

    if (!keyAvailable) {
      return 'Система не змогла визначити поточний ключ користувача. Без цього неможливо автоматично прив’язати сеанс до позивного.';
    }

    if (role === 'owner') return 'Усе добре. Користувача впізнано як власника. Це найвищий рівень доступу в системі.';
    if (role === 'sysadmin') return 'Усе добре. Користувача впізнано як сисадміна. Повний системний блок має бути доступний.';
    if (role === 'admin') return 'Усе добре. Користувача впізнано як адміністратора. Адмінські дії мають бути доступні.';
    if (role === 'maintainer') return 'Усе добре. Користувача впізнано як редактора. Розширені робочі дії дозволені, але системне адміністрування приховане.';
    if (role === 'operator') return 'Усе добре. Користувача впізнано як оператора. Доступні всі картки та зведення, а SEND_PANEL і робочі дії приховані.';
    if (role === 'viewer') return 'Користувача визначено як спостерігача. Він може відкривати тільки власну картку.';
    return 'Користувача визначено як гостя. Це найобмеженіший рівень безпечного перегляду.';
  }

  function buildAccessDebugAdvice_(access) {
    const role = safeString_((access && access.role) || 'guest').toLowerCase();
    const registered = !!(access && access.registered);
    const keyAvailable = !!(access && access.keyAvailable);
    const canSelfBind = !!(access && access.canSelfBind);
    const supportEmail = safeString_(access && access.supportEmail);

    if (keyAvailable && !registered && canSelfBind) {
      return 'Натисніть «Увійти», введіть email або телефон та свій позивний, і система сама перевірить збіг перед входом.';
    }

    if (keyAvailable && !registered && !canSelfBind) {
      return 'Цей сеанс бачить ключ користувача, але самостійна прив’язка для нього недоступна. ' + getSupportHelpText_() + '.';
    }

    if (!keyAvailable) {
      return 'Оновіть панель і повторіть перевірку. Якщо ключ знову не визначиться — ' + getSupportHelpText_().toLowerCase() + '.';
    }

    if (role === 'viewer') {
      return 'Для ролі viewer у ACCESS має бути заповнений власний person_callsign. Інших дій зараз не потрібно.';
    }

    return 'Додаткових дій не потрібно. Якщо панель поводиться не так, як роль у звіті, проблема вже не в доступі, а в окремій кнопці або серверному маршруті.';
  }

  function getAllowedActionsText_(access) {
    const list = Array.isArray(access && access.allowedActions) ? access.allowedActions : [];
    return list.length ? list.join(', ') : 'немає';
  }

  function getRotationModeLabel_(access) {
    return access && access.migrationModeEnabled ? 'ключ + email' : 'ключ користувача';
  }

  function buildAccessDebugReportText_(access) {
    const roleLabel = getAccessRoleLabel_(access && access.role);
    const sourceLabel = getAccessSourceLabel_(access && access.source);
    const displayName = safeString_((access && access.displayName) || '') || 'не визначено';
    const email = safeString_((access && access.email) || '') || 'не визначено';
    const keyMasked = safeString_((access && access.currentKeyHashMasked) || '') || 'не визначено';
    const keyState = access && access.keyAvailable ? 'визначено' : 'не визначено';
    const registeredLabel = access && access.registered ? 'так' : 'ні';
    const keyModeLabel = getRotationModeLabel_(access);
    const adminLabel = access && access.isAdmin ? 'так' : 'ні';
    const operatorLabel = access && access.isOperator ? 'так' : 'ні';
    const note = safeString_((access && access.note) || '') || 'немає';
    const personCallsign = safeString_((access && access.personCallsign) || '') || 'не задано';
    const reason = getAccessReasonDisplay_(access);
    const allowedActions = getAllowedActionsText_(access);
    const lastSeenAt = safeString_((access && access.lastSeenAt) || '') || 'немає';
    const lastRotatedAt = safeString_((access && access.lastRotatedAt) || '') || 'немає';
    const rotationState = safeString_((access && access.rotationState) || '') || 'невідомо';
    const supportEmail = safeString_((access && access.supportEmail) || '') || 'немає';

    return [
      'ПЕРЕВІРКА ДОСТУПУ',
      '=================',
      'Режим доступу: ' + roleLabel,
      'Схема доступу: ' + keyModeLabel,
      'Ключ користувача: ' + keyState,
      'Ключ користувача зареєстровано: ' + registeredLabel,
      'Маска hash: ' + keyMasked,
      'Display name: ' + displayName,
      'Email (довідково): ' + email,
      'Джерело доступу: ' + sourceLabel,
      'Адмін-доступ: ' + adminLabel,
      'Робочий доступ: ' + operatorLabel,
      'Дозволені дії: ' + allowedActions,
      'Примітка: ' + note,
      'Свій позивний: ' + personCallsign,
      'last_seen_at: ' + lastSeenAt,
      'last_rotated_at: ' + lastRotatedAt,
      'Стан ротації: ' + rotationState,
      'Контакт для допомоги: ШАХТАР',
      'Стан: ' + reason,
      '',
      'Що це означає:',
      buildAccessDebugExplanation_(access),
      '',
      'Що робити далі:',
      buildAccessDebugAdvice_(access)
    ].join('\n');
  }

  function ensureAccessDebugState_() {
    if (!STATE.accessDebug) {
      STATE.accessDebug = { hashVisible: false };
    }
    return STATE.accessDebug;
  }

  function updateAccessDebugHashUi_() {
    const state = ensureAccessDebugState_();
    const access = STATE.access || {};
    const hashFull = safeString_(access.currentKeyHashFull);
    const hashMasked = safeString_(access.currentKeyHashMasked);
    const block = document.getElementById('accessDebugHashBlock');
    const valueNode = document.getElementById('accessDebugHashValue');
    const toggleBtn = document.getElementById('accessDebugToggleHashBtn');
    const copyBtn = document.getElementById('accessDebugCopyHashBtn');

    if (block) block.style.display = state.hashVisible && hashFull ? 'block' : 'none';
    if (valueNode) valueNode.textContent = state.hashVisible && hashFull ? hashFull : '';
    if (toggleBtn) {
      toggleBtn.textContent = state.hashVisible && hashFull ? 'Сховати повний hash' : 'Показати повний hash';
      toggleBtn.disabled = !hashFull;
    }
    if (copyBtn) {
      copyBtn.disabled = !hashFull;
      copyBtn.textContent = 'Копіювати повний hash';
    }
    const maskedNode = document.getElementById('accessDebugMaskedHashValue');
    if (maskedNode) maskedNode.textContent = hashMasked || 'не визначено';
  }

  function toggleAccessDebugHash() {
    const state = ensureAccessDebugState_();
    const access = STATE.access || {};
    const hashFull = safeString_(access.currentKeyHashFull);
    if (!hashFull) {
      showToast('Повний hash недоступний');
      return;
    }
    state.hashVisible = !state.hashVisible;
    updateAccessDebugHashUi_();
  }

  async function copyAccessDebugHash() {
    try {
      const access = STATE.access || {};
      const hashFull = safeString_(access.currentKeyHashFull);
      if (!hashFull) {
        showToast('Повний hash недоступний');
        return;
      }
      const copied = await copyText_(hashFull);
      showToast(copied ? 'Повний hash скопійовано' : 'Не вдалося скопіювати повний hash');
    } catch (error) {
      logToConsole('✕ Не вдалося скопіювати повний hash: ' + normalizeError(error), 'error');
      showToast('Не вдалося скопіювати повний hash');
    }
  }

  function ensureAccessLoginState_() {
    if (!STATE.accessLogin) {
      STATE.accessLogin = { loading: false, modalOpen: false };
    }
    return STATE.accessLogin;
  }

  function ensureAccessLoginModal_() {
    let modal = document.getElementById('accessLoginModal');
    if (modal) return modal;

    modal = document.createElement('div');
    modal.id = 'accessLoginModal';
    modal.className = 'access-login-modal';
    modal.innerHTML = [
      '<div id="accessLoginModalBackdrop" class="access-login-modal__backdrop"></div>',
      '<div class="access-login-modal__dialog">',
      '  <div class="access-login-modal__header">',
      '    <div>',
      '      <div class="access-login-modal__title">Увійти</div>',
      '      <div class="access-login-modal__subtext">Введіть email або телефон і свій позивний</div>',
      '    </div>',
      '    <button type="button" id="btnCloseAccessLoginModal" class="access-login-modal__close">Вихід</button>',
      '  </div>',
      '  <div class="access-login-modal__content">',
      '    <div id="accessLoginModalMessage" class="access-login-modal__message"></div>',
      '    <div id="accessLoginModalLoading" class="access-login-modal__loading" style="display:none;">',
      '      <div class="access-login-modal__spinner" aria-hidden="true"></div>',
      '      <div id="accessLoginModalLoadingText" class="access-login-modal__loading-text">Підтверджую вхід...</div>',
      '      <div class="access-login-modal__loading-subtext">Зачекайте, будь ласка. Іде перевірка даних, часу та точки входу.</div>',
      '    </div>',
      '    <div id="accessLoginModalBody" class="access-login-modal__body is-form">',
      '      <label class="access-login-modal__field">',
      '        <span class="access-login-modal__label">Email або телефон</span>',
      '        <input id="accessLoginIdentifierInput" class="access-login-modal__input" type="text" autocomplete="username" placeholder="Введіть email або телефон">',
      '      </label>',
      '      <label class="access-login-modal__field">',
      '        <span class="access-login-modal__label">Позивний</span>',
      '        <input id="accessLoginCallsignInput" class="access-login-modal__input access-login-modal__input--callsign" type="text" autocomplete="off" placeholder="Введіть свій позивний">',
      '      </label>',
      '      <div class="access-login-modal__actions">',
      '        <button type="button" id="accessLoginSubmitBtn" class="access-login-modal__submit">Увійти</button>',
      '      </div>',
      '    </div>',
      '  </div>',
      '</div>'
    ].join('');

    document.body.appendChild(modal);

    const backdrop = document.getElementById('accessLoginModalBackdrop');
    const closeBtn = document.getElementById('btnCloseAccessLoginModal');
    const submitBtn = document.getElementById('accessLoginSubmitBtn');
    const identifierInput = document.getElementById('accessLoginIdentifierInput');
    const callsignInput = document.getElementById('accessLoginCallsignInput');

    if (backdrop) backdrop.addEventListener('click', closeAccessLoginModal);
    if (closeBtn) closeBtn.addEventListener('click', closeAccessLoginModal);
    if (submitBtn) submitBtn.addEventListener('click', submitAccessLoginForm_);

    [identifierInput, callsignInput].forEach(function (input) {
      if (!input) return;
      input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          submitAccessLoginForm_();
        }
      });
    });

    window.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        const state = ensureAccessLoginState_();
        if (state.modalOpen) closeAccessLoginModal();
      }
    });

    return modal;
  }

  function setAccessLoginModalMessage_(message, isError) {
    const box = document.getElementById('accessLoginModalMessage');
    if (!box) return;
    const text = safeString_(message);
    box.style.display = text ? 'block' : 'none';
    box.style.color = isError ? 'var(--danger-color, #f87171)' : 'var(--text-secondary, #9ca3af)';
    box.textContent = text;
  }

  function setAccessLoginLoading_(isLoading, loadingText) {
    const state = ensureAccessLoginState_();
    state.loading = !!isLoading;
    const identifierInput = document.getElementById('accessLoginIdentifierInput');
    const callsignInput = document.getElementById('accessLoginCallsignInput');
    const submitBtn = document.getElementById('accessLoginSubmitBtn');
    const closeBtn = document.getElementById('btnCloseAccessLoginModal');
    const body = document.getElementById('accessLoginModalBody');
    const loadingBox = document.getElementById('accessLoginModalLoading');
    const loadingTextEl = document.getElementById('accessLoginModalLoadingText');

    if (identifierInput) identifierInput.disabled = !!isLoading;
    if (callsignInput) callsignInput.disabled = !!isLoading;
    if (submitBtn) {
      submitBtn.disabled = !!isLoading;
      submitBtn.textContent = isLoading ? 'Підтверджую...' : 'Увійти';
    }
    if (closeBtn) {
      closeBtn.disabled = !!isLoading;
      closeBtn.classList.toggle('is-disabled', !!isLoading);
    }
    if (body) body.style.display = isLoading ? 'none' : 'grid';
    if (loadingBox) loadingBox.style.display = isLoading ? 'grid' : 'none';
    if (loadingTextEl) loadingTextEl.textContent = safeString_(loadingText) || 'Підтверджую вхід...';
  }

  function closeAccessLoginModal() {
    const modal = document.getElementById('accessLoginModal');
    const state = ensureAccessLoginState_();
    if (state.loading) return;
    state.modalOpen = false;
    state.loading = false;
    if (modal) modal.style.display = 'none';
  }

  function openAccessLoginFlow() {
    const access = normalizeAccessForUi_(STATE.access || {});
    const state = ensureAccessLoginState_();

    if (!access.keyAvailable) {
      showToast('Спочатку треба визначити ключ користувача');
      return;
    }

    if (access.loginLockout && access.loginLockout.locked) {
      const lockMessage = 'Вхід тимчасово заблоковано на ' + safeNumber_(access.loginLockout.remainingMinutes, 0) + ' хв. ' + getSupportHelpText_() + '.';
      showToast(lockMessage);
      return;
    }

    if (!access.selfBindRequired && !access.canSelfBind) {
      showToast('Вхід уже підтверджено');
      return;
    }

    const modal = ensureAccessLoginModal_();
    if (typeof hideToast === 'function') hideToast();
    modal.style.display = 'block';
    state.modalOpen = true;
    setAccessLoginLoading_(false, 'Підтверджую вхід...');
    setAccessLoginModalMessage_('Введіть email або телефон та свій позивний. Якщо виникне помилка — ' + getSupportHelpText_().toLowerCase() + '.', false);

    const identifierInput = document.getElementById('accessLoginIdentifierInput');
    const callsignInput = document.getElementById('accessLoginCallsignInput');
    if (identifierInput) identifierInput.value = '';
    if (callsignInput) callsignInput.value = '';
    if (identifierInput) identifierInput.focus();
  }

  async function submitAccessLoginForm_() {
    const state = ensureAccessLoginState_();
    if (state.loading) return;

    const identifierInput = document.getElementById('accessLoginIdentifierInput');
    const callsignInput = document.getElementById('accessLoginCallsignInput');
    const identifier = safeString_(identifierInput && identifierInput.value);
    const callsign = safeString_(callsignInput && callsignInput.value).toUpperCase();

    if (!identifier) {
      setAccessLoginModalMessage_('Введіть email або телефон.', true);
      if (identifierInput) identifierInput.focus();
      return;
    }

    if (!callsign) {
      setAccessLoginModalMessage_('Введіть свій позивний.', true);
      if (callsignInput) callsignInput.focus();
      return;
    }

    setAccessLoginModalMessage_('', false);
    setAccessLoginLoading_(true, 'Підтверджую вхід...');

    try {
      const loginMeta = await buildLoginMeta_();
      const result = await MaintenanceApi.loginByIdentifierAndCallsign({
        identifier: identifier,
        callsign: callsign,
        loginMeta: loginMeta
      });
      const data = result && result.data ? result.data : {};

      if (!result || !result.success) {
        const message = result && (result.error || result.message) || 'Не вдалося виконати вхід';
        setAccessLoginLoading_(false, 'Підтверджую вхід...');
        setAccessLoginModalMessage_(message, true);
        if (typeof hideToast === 'function') hideToast();
        await loadAccessDescriptor();
        if (callsignInput) {
          callsignInput.disabled = false;
          callsignInput.focus();
          callsignInput.select();
        }
        if (identifierInput) identifierInput.disabled = false;
        return;
      }

      STATE.access = normalizeAccessForUi_(data.descriptor || {});
      setAccessLoginLoading_(false, 'Підтверджую вхід...');
      closeAccessLoginModal();
      applyAccessPolicyUI();
      showToast(data.message || ('Вхід виконано: ' + callsign));
      logToConsole('✓ Вхід підтверджено для позивного ' + callsign + '. ' + (loginMeta.enteredAtText || ''), 'success');
    } catch (error) {
      const message = normalizeError(error);
      setAccessLoginLoading_(false, 'Підтверджую вхід...');
      setAccessLoginModalMessage_(message, true);
      if (typeof hideToast === 'function') hideToast();
      if (callsignInput) {
        callsignInput.disabled = false;
        callsignInput.focus();
        callsignInput.select();
      }
      if (identifierInput) identifierInput.disabled = false;
    }
  }

  function applyAccessPolicyUI() {
    const banner = $id('accessBanner');
    const message = $id('accessBannerText');
    const access = normalizeAccessForUi_(STATE.access || {
      role: 'guest',
      isAdmin: false,
      knownUser: false,
      reasonString: ''
    });

    STATE.access = access;
    if (!banner || !message) return;

    banner.style.display = 'block';
    banner.classList.remove(
      'is-guest', 'is-viewer', 'is-operator', 'is-maintainer', 'is-admin', 'is-sysadmin', 'is-owner', 'is-safe-mode'
    );
    banner.classList.add('is-' + String(access.role || 'guest').toLowerCase());
    if (!access.knownUser) banner.classList.add('is-safe-mode');

    const roleLabel = getAccessRoleLabel_(access.role);
    const parts = ['<span>Режим доступу : ' + escapeHtml(roleLabel) + '</span>'];
    if (access.loginLockout && access.loginLockout.locked) {
      parts.push('<span class="status-badge__meta">Вхід заблоковано на ' + escapeHtml(String(access.loginLockout.remainingMinutes || 0)) + ' хв</span>');
    } else if (access.selfBindRequired && access.canSelfBind) {
      parts.push('<button type="button" class="btn" style="min-width:auto; padding:6px 10px;" onclick="openAccessLoginFlow()">Увійти</button>');
    } else if (!access.keyAvailable && !access.registered) {
      parts.push('<button type="button" class="btn" style="min-width:auto; padding:6px 10px;" onclick="loadAccessDescriptor()">Повторити</button>');
    }

    message.innerHTML = parts.join(' ');
    message.style.display = 'flex';
    message.style.alignItems = 'center';
    message.style.flexWrap = 'wrap';
    message.style.gap = '8px';

    const consoleMessage = buildAccessBannerMessage_(access);
    if (consoleMessage) {
      logToConsole('🛡 ' + consoleMessage, access.knownUser ? 'info' : 'warning');
    }

    updateRestrictedUi_();
  }

  async function loadAccessDescriptor() {
    const requestId = safeNumber_(STATE._accessDescriptorRequestId, 0) + 1;
    STATE._accessDescriptorRequestId = requestId;

    try {
      const descriptor = await MaintenanceApi.getAccessDescriptor();
      const raw = descriptor && descriptor.data
        ? descriptor.data
        : { role: 'guest', isAdmin: false, knownUser: false, reasonString: '' };
      if (STATE._accessDescriptorRequestId !== requestId) return;
      STATE.access = normalizeAccessForUi_(raw);
    } catch (error) {
      if (STATE._accessDescriptorRequestId !== requestId) return;
      STATE.access = normalizeAccessForUi_({
        role: 'guest',
        isAdmin: false,
        knownUser: false,
        reasonString: normalizeError(error)
      });
    }

    if (STATE.accessDebug) {
      STATE.accessDebug.hashVisible = false;
    }

    applyAccessPolicyUI();
  }

  function getActionRequiredRole_(actionName) {
    const map = {
      daySummary: 'operator',
      detailedDay: 'operator',
      generatePanel: 'maintainer',
      sendUnsent: 'maintainer',
      createNextMonth: 'maintainer',
      switchMonth: 'maintainer',
      vacationReminder: 'maintainer',
      birthdayCheck: 'maintainer',
      debugPhones: 'maintainer',
      healthCheck: 'maintainer',
      pendingRepairs: 'maintainer',
      operationDetails: 'maintainer',
      runRepair: 'sysadmin',
      clearLog: 'admin',
      clearCache: 'sysadmin',
      clearPhoneCache: 'sysadmin',
      restartBot: 'sysadmin',
      applyProtections: 'sysadmin',
      setupTrigger: 'sysadmin',
      cleanupTriggers: 'sysadmin'
    };
    return map[actionName] || '';
  }

  async function assertActionAccess_(actionName) {
    const required = getActionRequiredRole_(actionName);
    if (!required || hasRoleAtLeast_(required)) return true;

    showToast('Недостатньо прав для дії: ' + getActionName(actionName));
    logToConsole(
      'Недостатньо прав для дії ' + getActionName(actionName) + '. Потрібна роль: ' + getAccessRoleLabel_(required),
      'warning'
    );

    Promise.resolve(reportAccessViolation_('sidebarActionUiDenied', {
      source: 'sidebar-menu',
      requestedAction: String(actionName || ''),
      requiredRole: required,
      currentRole: String((STATE.access && STATE.access.role) || 'guest')
    })).catch(function () {});

    return false;
  }

  function assertAdminAction_(actionName) {
    const required = getActionRequiredRole_(actionName) || 'admin';
    if (hasRoleAtLeast_(required)) return true;

    Promise.resolve(reportAccessViolation_('sidebarActionUiDenied', {
      source: 'sidebar-legacy-guard',
      requestedAction: String(actionName || ''),
      requiredRole: required,
      currentRole: String((STATE.access && STATE.access.role) || 'guest')
    })).catch(function (error) {
      logToConsole('Не вдалося зафіксувати порушення доступу: ' + normalizeError(error), 'error');
    });

    const message = 'Недостатньо прав для дії: ' + getActionName(actionName);
    showToast(message);
    logToConsole(
      '✕ Недостатньо прав для дії ' + getActionName(actionName) + '. Потрібна роль: ' + getAccessRoleLabel_(required),
      'warning'
    );
    throw new Error(message);
  }

  window.buildAccessDebugExplanation_ = buildAccessDebugExplanation_;
  window.buildAccessDebugAdvice_ = buildAccessDebugAdvice_;
