<script>
// Js.Helpers — active Stage 7.1 runtime fragment.

  // =========================
  // CONSOLE
  // =========================
  function toggleConsole() {
    const consoleSection = $id('consoleSection');
    const toggle = $id('consoleToggle');
    const arrow = $id('consoleArrow');

    if (!consoleSection || !toggle || !arrow) return;

    consoleSection.classList.toggle('open');
    toggle.classList.toggle('open');
    arrow.textContent = consoleSection.classList.contains('open') ? '▲' : '▼';

    localStorage.setItem('consoleOpen', consoleSection.classList.contains('open'));
  }

  function logToConsole(message, type = 'info') {
    const consoleEl = $id('consoleOutput');
    if (!consoleEl) return;

    const timestamp = new Date().toLocaleTimeString('uk-UA', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });

    const logEntry = document.createElement('div');
    logEntry.className = `log-entry log-${type}`;
    logEntry.innerHTML = `<span class="log-time">[${timestamp}]</span> ${escapeHtml(message)}`;

    consoleEl.appendChild(logEntry);
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  function clearConsole() {
    const consoleEl = $id('consoleOutput');
    if (!consoleEl) return;

    consoleEl.innerHTML = '';
    logToConsole('🧹 Консоль очищено', 'info');
  }

  function scrollConsole(direction) {
    const consoleEl = $id('consoleOutput');
    if (!consoleEl) return;

    consoleEl.scrollTop = direction === 'top' ? 0 : consoleEl.scrollHeight;
  }

  // =========================
  // PROGRESS
  // =========================
  function showProgressBar(total, current) {
    let progressEl = $id('sendingProgress');

    if (!progressEl) {
      const resultContent = $id('resultContent');
      if (!resultContent) return;

      resultContent.insertAdjacentHTML('afterbegin', `
        <div class="result-item" id="sendingProgress">
          <div class="result-label">📤 Прогрес відправки</div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div id="progressText" class="progress-text">0/${total}</div>
        </div>
      `);
    }

    const fill = $id('progressFill');
    const text = $id('progressText');

    if (fill && text) {
      const percent = total ? Math.round((current / total) * 100) : 0;
      fill.style.width = percent + '%';
      text.textContent = `${current}/${total}`;
    }
  }

  function hideProgressBar() {
    $id('sendingProgress')?.remove();
  }



  function isAdminRole() {
    return !!(STATE.access && STATE.access.isAdmin);
  }

  function getAccessRoleLabel_(role) {
    const map = { viewer: 'Перегляд', operator: 'Оператор', admin: 'Адміністратор', sysadmin: 'Сис. адміністратор' };
    return map[String(role || 'viewer').trim().toLowerCase()] || 'Перегляд';
  }

  function buildAccessBannerMessage_(descriptor) {
    const access = descriptor || STATE.access || {};
    const reason = String(access.reason || '').trim();
    const note = String(access.note || '').trim();
    const source = String(access.source || '').trim();
    const consoleParts = [];
    if (reason) consoleParts.push(reason);
    if (note) consoleParts.push('Примітка: ' + note);
    if (source) consoleParts.push('Джерело: ' + source);
    return consoleParts.join(' • ');
  }


  function getAccessSourceLabel_(source) {
    const raw = String(source || '').trim();
    const map = {
      'ACCESS': 'лист ACCESS (старий email-режим)',
      'ACCESS-user-key-current': 'зареєстрований поточний user key',
      'ACCESS-user-key-prev': 'зареєстрований попередній user key',
      'ACCESS-user-key-rotated': 'user key оновлено автоматично',
      'ACCESS-user-key-unregistered': 'user key не зареєстровано',
      'ACCESS-email-bound-key': 'ключ прив’язано до рядка ACCESS через legacy email',
      'scriptProperties': 'налаштування Script Properties (legacy email)',
      'bootstrap-admin': 'тимчасовий bootstrap-admin',
      'ACCESS-fallback-sysadmin': 'резервний sysadmin із ACCESS (міграційний режим)',
      'ACCESS-fallback-admin': 'резервний admin із ACCESS (міграційний режим)',
      'default': 'режим за замовчуванням'
    };
    return map[raw] || (raw || 'невідомо');
  }

  function maskAccessKey_(value) {
    const key = String(value || '').trim();
    if (!key) return 'не визначено';
    if (key.length <= 10) return key;
    return key.slice(0, 6) + '…' + key.slice(-4);
  }

  function buildAccessDebugExplanation_(access) {
    const role = String(access && access.role || 'viewer').toLowerCase();
    const registered = !!(access && access.registered);
    const keyMode = !!(access && access.userKeyModeEnabled);
    const keyAvailable = !!(access && access.keyAvailable);
    const source = String(access && access.source || '').trim();

    if (keyMode && !registered && !keyAvailable) {
      return 'Система вже працює в режимі user key, але поточний сеанс не віддав ключ користувача. Через це доступ знижено до безпечного режиму перегляду.';
    }
    if (keyMode && !registered && keyAvailable) {
      return 'Система отримала user key поточного користувача, але не знайшла його в листі ACCESS. Через це доступ знижено до безпечного режиму перегляду.';
    }
    if (!keyMode && (source === 'ACCESS-fallback-sysadmin' || source === 'ACCESS-fallback-admin')) {
      return 'ACCESS ще не переведено повністю на user key. Тимчасово застосовано міграційний резервний доступ, щоб не заблокувати адміністратора.';
    }
    if (!keyMode && !registered) {
      return 'Система ще працює в legacy email-режимі, але не змогла надійно впізнати користувача. Через це доступ знижено до перегляду.';
    }
    if (role === 'sysadmin') {
      return 'Усе добре. Користувача впізнано як сис. адміністратора. Повний системний блок має бути доступний.';
    }
    if (role === 'admin') {
      return 'Усе добре. Користувача впізнано як адміністратора. Адмінські дії мають бути доступні.';
    }
    if (role === 'operator') {
      return 'Усе добре. Користувача впізнано як оператора. Робочі дії дозволені, а небезпечні системні дії приховані.';
    }
    return 'Користувача визначено в режимі перегляду. Це означає, що для нього не знайдено зареєстрований ключ або вищий рівень доступу.';
  }

  function buildAccessDebugAdvice_(access) {
    const role = String(access && access.role || 'viewer').toLowerCase();
    const registered = !!(access && access.registered);
    const keyMode = !!(access && access.userKeyModeEnabled);
    const keyAvailable = !!(access && access.keyAvailable);

    if (keyMode && !registered && keyAvailable) {
      return 'Скопіюйте свій user key та внесіть його в ACCESS у колонку user_key_current навпроти потрібної ролі. Якщо ключ змінився — старий можна тимчасово покласти в user_key_prev.';
    }
    if (keyMode && !registered && !keyAvailable) {
      return 'Перевірте, чи цей сеанс Google Apps Script віддає temporary user key. Якщо ні — цей браузер/сеанс не зможе пройти user key-ідентифікацію.';
    }
    if (!keyMode) {
      return 'Переведіть ACCESS на user key: додайте ключі користувачів у user_key_current. Старий email у колонці email можна залишити лише як довідкове поле.';
    }
    if (role === 'viewer') {
      return 'Перевірте ACCESS: user_key_current без пробілів, роль одна з viewer/operator/admin/sysadmin, enabled = TRUE.';
    }
    return 'Додаткових дій не потрібно. Якщо панель поводиться не так, як роль у звіті, проблема вже не в доступі, а в UI або окремій кнопці.';
  }

  function buildAccessDebugReportText_(access) {
    const roleLabel = getAccessRoleLabel_(access && access.role);
    const sourceLabel = getAccessSourceLabel_(access && access.source);
    const email = String(access && access.email || '').trim() || 'не визначено';
    const currentKey = String(access && access.currentKey || '').trim() || 'не визначено';
    const keyMasked = maskAccessKey_(currentKey);
    const registeredLabel = access && access.registered ? 'так' : 'ні';
    const keyModeLabel = access && access.userKeyModeEnabled ? 'user key' : 'legacy email (міграційний режим)';
    const keyAvailableLabel = access && access.keyAvailable ? 'так' : 'ні';
    const adminLabel = access && access.isAdmin ? 'так' : 'ні';
    const operatorLabel = access && access.isOperator ? 'так' : 'ні';
    const note = String(access && access.note || '').trim() || 'немає';
    const reason = String(access && access.reason || '').trim() || 'немає';

    return [
      'ПЕРЕВІРКА ДОСТУПУ',
      '=================',
      'Режим доступу: ' + roleLabel,
      'Режим ідентифікації: ' + keyModeLabel,
      'Ключ користувача доступний: ' + keyAvailableLabel,
      'Ключ користувача зареєстровано: ' + registeredLabel,
      'Поточний user key: ' + currentKey,
      'Маска ключа: ' + keyMasked,
      'Email (довідково): ' + email,
      'Джерело доступу: ' + sourceLabel,
      'Адмін-доступ: ' + adminLabel,
      'Робочий доступ: ' + operatorLabel,
      'Примітка: ' + note,
      'Технічна причина: ' + reason,
      '',
      'Що це означає:',
      buildAccessDebugExplanation_(access),
      '',
      'Що робити далі:',
      buildAccessDebugAdvice_(access)
    ].join('\n');
  }

  function renderAccessDebugResult_(access) {
    const roleLabel = getAccessRoleLabel_(access && access.role);
    const sourceLabel = getAccessSourceLabel_(access && access.source);
    const email = String(access && access.email || '').trim() || 'Не вдалося визначити';
    const currentKey = String(access && access.currentKey || '').trim();
    const maskedKey = maskAccessKey_(currentKey);
    const registeredLabel = access && access.registered ? 'Так' : 'Ні';
    const keyModeLabel = access && access.userKeyModeEnabled ? 'user key' : 'legacy email (міграційний режим)';
    const keyAvailableLabel = access && access.keyAvailable ? 'Так' : 'Ні';
    const adminLabel = access && access.isAdmin ? 'Дозволено' : 'Заблоковано';
    const operatorLabel = access && access.isOperator ? 'Дозволено' : 'Заблоковано';
    const reason = String(access && access.reason || '').trim() || 'Немає';
    const note = String(access && access.note || '').trim() || 'Немає';
    const explanation = buildAccessDebugExplanation_(access);
    const advice = buildAccessDebugAdvice_(access);
    const reportText = buildAccessDebugReportText_(access);
    const keyToCopy = currentKey || '';

    return `
      <div class="result-item">
        <div class="result-label">Перевірка доступу</div>
        <div class="result-value">
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
            <button class="btn btn-primary" type="button" onclick="SidebarApp.copyResultText('${escapeJsString(reportText)}')">Копіювати звіт</button>
            <button class="btn" type="button" onclick="SidebarApp.copyResultText('${escapeJsString(keyToCopy)}')" ${!keyToCopy ? 'disabled' : ''}>Копіювати user key</button>
          </div>

          <div style="display:grid; gap:10px;">
            <div style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <div style="font-size:0.78rem; color:var(--text-secondary);">Поточний режим</div>
              <div style="font-size:1rem; font-weight:700; margin-top:4px;">${escapeHtml(roleLabel)}</div>
            </div>

            <div style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <div style="font-size:0.78rem; color:var(--text-secondary);">Ідентифікація користувача</div>
              <div style="margin-top:6px; line-height:1.5;">
                <div><b>Режим:</b> ${escapeHtml(keyModeLabel)}</div>
                <div><b>Ключ доступний:</b> ${escapeHtml(keyAvailableLabel)}</div>
                <div><b>Ключ зареєстровано:</b> ${escapeHtml(registeredLabel)}</div>
                <div><b>Поточний user key:</b> ${escapeHtml(currentKey || 'Не вдалося визначити')}</div>
                <div><b>Коротка маска:</b> ${escapeHtml(maskedKey)}</div>
                <div><b>Email (довідково):</b> ${escapeHtml(email)}</div>
                <div><b>Джерело доступу:</b> ${escapeHtml(sourceLabel)}</div>
              </div>
            </div>

            <div style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <div style="font-size:0.78rem; color:var(--text-secondary);">Що дозволено</div>
              <div style="margin-top:6px; line-height:1.5;">
                <div><b>Робочі дії:</b> ${escapeHtml(operatorLabel)}</div>
                <div><b>Небезпечні системні дії:</b> ${escapeHtml(adminLabel)}</div>
              </div>
            </div>

            <div style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <div style="font-size:0.78rem; color:var(--text-secondary);">Що це означає</div>
              <div style="margin-top:6px; line-height:1.55;">${escapeHtml(explanation)}</div>
            </div>

            <div style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <div style="font-size:0.78rem; color:var(--text-secondary);">Що робити далі</div>
              <div style="margin-top:6px; line-height:1.55;">${escapeHtml(advice)}</div>
            </div>

            <div style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <div style="font-size:0.78rem; color:var(--text-secondary);">Як заповнювати ACCESS тепер</div>
              <div style="margin-top:6px; line-height:1.55;">
                <div>1. У рядку користувача залиш role та enabled.</div>
                <div>2. У колонку <b>user_key_current</b> встав поточний ключ користувача.</div>
                <div>3. Якщо ключ змінився, старий тимчасово поклади в <b>user_key_prev</b>.</div>
                <div>4. Колонку <b>email</b> можеш залишити як довідкову, але доступ тепер іде не по ній.</div>
              </div>
            </div>

            <details style="padding:10px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-glass);">
              <summary style="cursor:pointer; font-weight:700;">Технічні деталі</summary>
              <div style="margin-top:8px; line-height:1.5;">
                <div><b>Причина:</b> ${escapeHtml(reason)}</div>
                <div><b>Примітка:</b> ${escapeHtml(note)}</div>
              </div>
              <pre style="margin-top:10px; white-space:pre-wrap; word-break:break-word; font-size:0.78rem; color:var(--text-secondary);">${escapeHtml(JSON.stringify(access || {}, null, 2))}</pre>
            </details>
          </div>
        </div>
      </div>
    `;
  }
  function applyAccessPolicyUI() {
    const banner = $id('accessBanner');
    const message = $id('accessBannerText');
    const access = STATE.access || { role: 'viewer', isAdmin: false, knownUser: false, reason: '' };
    const isAdmin = !!access.isAdmin;

    document.querySelectorAll('[data-admin-only="true"]').forEach(function(el) {
      el.style.display = isAdmin ? '' : 'none';
    });

    if (!banner || !message) return;

    banner.style.display = 'block';
    banner.classList.remove('is-viewer', 'is-operator', 'is-admin', 'is-sysadmin', 'is-safe-mode');
    banner.classList.add('is-' + String(access.role || 'viewer').toLowerCase());

    if (!access.knownUser) {
      banner.classList.add('is-safe-mode');
    }

    const roleLabel = getAccessRoleLabel_(access.role);
    message.textContent = 'Режим доступу : ' + roleLabel;
    message.style.display = 'block';

    const consoleMessage = buildAccessBannerMessage_(access);
    if (consoleMessage) {
      logToConsole('🛡 ' + consoleMessage, access.knownUser ? 'info' : 'warning');
    }
  }

  async function loadAccessDescriptor() {
    try {
      const descriptor = await MaintenanceApi.getAccessDescriptor();
      STATE.access = descriptor && descriptor.data ? descriptor.data : { role: 'viewer', isAdmin: false, knownUser: false, reason: '' };
    } catch (error) {
      STATE.access = { role: 'viewer', isAdmin: false, knownUser: false, reason: normalizeError(error) };
    }
    applyAccessPolicyUI();
  }

  function assertAdminAction_(actionName) {
    if (isAdminRole()) return true;
    throw new Error('Недостатньо прав для дії: ' + String(actionName || 'admin action'));
  }

  // =========================
  // INIT
  // =========================
  async function initSidebar() {
    showLoading();
    hidePersonCard();

    try {
      const consoleOpen = localStorage.getItem('consoleOpen') === 'true';
      if (consoleOpen && !STATE.consoleInitialized) {
        $id('consoleSection')?.classList?.add('open');
        $id('consoleToggle')?.classList?.add('open');

        const arrow = $id('consoleArrow');
        if (arrow) arrow.textContent = '▲';

        STATE.consoleInitialized = true;
      }

      await loadAccessDescriptor();

      const data = await Stage4Api.getMonths();

      if (data?.months) STATE.monthsList = data.months;

      if (data?.current) {
        STATE.currentMonth = data.current;
        updateMonthBadge(STATE.currentMonth);
      }

      logToConsole('✓ Панель готова до роботи', 'success');
    } catch (error) {
      logToConsole(`✕ Помилка ініціалізації: ${normalizeError(error)}`, 'error');
    } finally {
      hideLoading();
    }
  }



  function formatOperationDate(value) {
    const raw = String(value || '').trim();
    if (!raw) return '—';
    const parsed = new Date(raw);
    if (!Number.isFinite(parsed.getTime())) return raw;
    return parsed.toLocaleString('uk-UA', {
      weekday: 'short',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
  }

  function translateLifecycleScenario(value) {
    const raw = String(value || '').trim();
    const map = {
      restart_bot: 'перезапуск бота',
      reconciliation: 'звірка',
      mark_sent: 'позначення як відправлено',
      mark_unsent: 'зняття позначки відправлення',
      repair: 'виправлення',
      create_next_month: 'створення наступного місяця',
      panel_regenerate: 'перегенерація панелі',
      panel_rebuild: 'перебудова панелі',
      panel_sync: 'синхронізація панелі'
    };
    return map[raw] || raw;
  }

  function translateLifecycleStatus(value) {
    const raw = String(value || '').trim();
    const map = {
      STARTED: 'РОЗПОЧАТО',
      NEEDS_REPAIR: 'ПОТРЕБУЄ ВИПРАВЛЕННЯ',
      COMMITTED: 'ЗАВЕРШЕНО',
      FAILED: 'ПОМИЛКА',
      FAILED_STALE: 'ПОМИЛКА (зависла операція)',
      ABANDONED: 'ПЕРЕРВАНО',
      CANCELLED: 'СКАСОВАНО'
    };
    return map[raw] || raw;
  }

  function translateLifecycleText(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const directMap = {
      'context is not defined': 'Помилка: context не визначено',
      'Repair failed': 'Виправлення завершилося з помилкою',
      'Repair repository недоступний': 'Сховище виправлення недоступне',
      'Repair завершився з помилкою': 'Виправлення завершилося з помилкою',
      'Repair виконано': 'Виправлення виконано'
    };
    if (directMap[raw]) return directMap[raw];
    return raw
      .replace(/^Repair failed$/i, 'Виправлення завершилося з помилкою')
      .replace(/^Repair completed$/i, 'Виправлення виконано')
      .replace(/^Repair /i, 'Виправлення ')
      .replace(/^Pending Repairs$/i, 'Операції, що потребують виправлення')
      .replace(/FAILED_STALE/g, 'Помилка (зависла операція)')
      .replace(/FAILED/g, 'Помилка')
      .replace(/COMMITTED/g, 'Завершено')
      .replace(/STARTED/g, 'Розпочато')
      .replace(/NEEDS_REPAIR/g, 'Потребує виправлення')
      .replace(/ABANDONED/g, 'Перервано')
      .replace(/CANCELLED/g, 'Скасовано');
  }

  function copyConsole() {
    const output = $id('consoleOutput');
    const month = STATE.currentMonth || '—';
    const dateText = new Date().toLocaleString('uk-UA');
    const body = output
      ? Array.from(output.querySelectorAll('.log-entry')).map(el => (el.innerText || '').trim()).filter(Boolean).join('\n')
      : '';
    const text = [
      'WAPB EXECUTION LOG',
      '=================',
      'Час: ' + dateText,
      'Активний місяць: ' + month,
      '',
      body || 'Лог порожній'
    ].join('\n');
    copyResultText(text);
  }

  function getActionName(action) {
    const names = {
      generatePanel: 'Створення панелі',
      sendUnsent: 'Панель відправки',
      daySummary: 'Зведення дня',
      detailedDay: 'Детальне зведення',
      createNextMonth: 'Створення місяця',
      switchMonth: 'Перемикання місяця',
      clearCache: 'Очищення кешу',
      clearLog: 'Очищення логів',
      restartBot: 'Перезапуск бота',
      applyProtections: 'Захист службових листів',
      pendingRepairs: 'Операції, що потребують виправлення',
      vacationReminder: 'Нагадування про відпустки',
      birthdayCheck: 'Дні Народження',
      debugAccess: 'Перевірка доступу'
    };

    return names[action] || action;
  }

  function handleError(error) {
    const message = normalizeError(error);

    hideLoading();
    hideProgressBar();
    stopSending();

    logToConsole(`✕ Помилка: ${message}`, 'error');
    displayInResult('error', { error: message });
  }

  async function handleMenuAction(action) {
    logToConsole(`➡️ Виконання: ${getActionName(action)}`, 'info');

    try {
      if (['clearCache', 'clearLog', 'restartBot', 'clearPhoneCache', 'setupTrigger', 'cleanupTriggers', 'debugPhones', 'healthCheck', 'pendingRepairs', 'applyProtections'].indexOf(action) !== -1) assertAdminAction_(action);
      switch (action) {
        case 'generatePanel': {
          primeWhatsAppSenderTab();
          const result = await ActionDispatcher.run('generatePanel', () => Stage4Api.generatePanelForDate({ date: _todayStr_() }));
          await displayPanelResult(result);
          break;
        }

        case 'sendUnsent': {
          let panelRows = Array.isArray(STATE.currentPanelData) ? STATE.currentPanelData : [];
          if (!panelRows.length) {
            try {
              panelRows = await ensurePanelDataLoadedFromServer({
                silent: false,
                preserveNonEmpty: false,
                retries: 2,
                retryDelayMs: 450,
                reason: 'sendUnsent.open'
              });
            } catch (error) {
              logToConsole(`✕ Не вдалося перечитати SEND_PANEL: ${normalizeError(error)}`, 'error');
              showSendPanel();
              return;
            }
          }
          if (!Array.isArray(panelRows) || panelRows.length === 0) {
            logToConsole('⁈ SEND_PANEL порожній навіть після перечитування', 'warning');
          }
          showSendPanel();
          break;
        }

        case 'daySummary':
        case 'detailedDay':
          showCalendar(action);
          break;

        case 'createNextMonth': {
          const result = await ActionDispatcher.run('createNextMonth', () => Stage4Api.createNextMonth({ switchToNewMonth: true }));
          if (result?.success) {
            logToConsole(`✓ ${result.message}`, 'success');
            showStandardResult('Створення місяця');
            displayInResult('createMonth', result);
          } else {
            displayInResult('error', { error: result?.error || 'Невідома помилка' });
          }
          break;
        }

        case 'vacationReminder': {
          const result = await ActionDispatcher.run('checkVacationsAndBirthdays', () => Stage4Api.checkVacationsAndBirthdays(_todayStr_()));
          if (result?.success) {
            showStandardResult('Нагадування про відпустки');
            displayInResult('vacationResult', Object.assign({}, result.vacations || {}, { message: result.message || '' }));
            logToConsole('🏖️ Нагадування про відпустки перевірено', 'success');
          } else {
            displayInResult('error', { error: result?.error || 'Невідома помилка' });
          }
          break;
        }

        case 'birthdayCheck': {
          const result = await ActionDispatcher.run('checkBirthdays', () => Stage4Api.checkVacationsAndBirthdays(_todayStr_()));
          if (result?.success) {
            showStandardResult('🎂 Дні Народження');
            displayBirthdayResult(result.birthdays || {});
            logToConsole('🎂 Перевірка ДН виконана', 'success');
          } else {
            displayInResult('error', { error: result?.error || 'Невідома помилка' });
          }
          break;
        }

        case 'switchMonth':
          await showMonthSwitcher();
          break;

        case 'debugAccess': {
          showStandardResult('Перевірка доступу');
          setHtml('resultContent', `
            <div class="result-item">
              <div class="result-value">Перевіряю доступ...</div>
            </div>
          `);

          const result = await ActionDispatcher.run('debugAccess', () => MaintenanceApi.debugAccess(), { successMessage: '' });
          if (!result?.success) {
            displayInResult('error', { error: result?.error || 'Невідома помилка' });
            break;
          }

          const data = result.data || {};
          logToConsole(
            '🔐 Access debug: role=' + String(data.role || 'viewer') +
            ', registered=' + String(!!data.registered) +
            ', source=' + String(data.source || 'default') +
            ', key=' + String(data.currentKey ? maskAccessKey_(data.currentKey) : '∅'),
            data.registered ? 'info' : 'warning'
          );

          setHtml('resultContent', renderAccessDebugResult_(data));
          break;
        }

        case 'clearCache': {
          const result = await ActionDispatcher.run('clearCache', () => MaintenanceApi.clearCache());
          displayInResult(
            result?.success ? 'success' : 'error',
            result?.success
              ? { message: result.message }
              : { error: result?.error || 'Невідома помилка' }
          );
          break;
        }

        case 'healthCheck':
          showHealthCheckPanel();
          break;

        case 'pendingRepairs':
          await showPendingRepairs();
          break;

        case 'restartBot':
          await restartBot();
          break;

        case 'clearLog': {
          const result = await ActionDispatcher.run('clearLog', () => MaintenanceApi.clearLog());
          if (result?.success) clearConsole();
          displayInResult(
            result?.success ? 'success' : 'error',
            result?.success
              ? { message: result.message }
              : { error: result?.error || 'Невідома помилка' }
          );
          break;
        }

        case 'applyProtections':
          await applyProtections();
          break;

        default:
          logToConsole(`⁈ Невідома дія: ${action}`, 'warning');
      }
    } catch (error) {
      handleError(error);
    }
  }
</script>
